<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌱 ปลูกต้นไม้เรียนรู้</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark:  #2e7d32;
    --green-mid:   #43a047;
    --green-light: #c8e6c9;
    --green-pale:  #e8f5e9;
    --blue:        #42a5f5;
    --blue-pale:   #e3f2fd;
    --amber:       #fb8c00;
    --amber-pale:  #fff3e0;
    --red:         #e53935;
    --red-pale:    #ffebee;
    --text-main:   #1b2a1d;
    --text-sub:    #4a6741;
    --card-bg:     #ffffff;
    --page-bg:     #f0f7f0;
    --border:      rgba(67,160,71,0.18);
    --shadow:      0 2px 12px rgba(46,125,50,0.10);
  }

  html, body {
    height: 100%;
    background: var(--page-bg);
    font-family: 'Sarabun', sans-serif;
    color: var(--text-main);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  #app {
    max-width: 420px;
    margin: 0 auto;
    padding: 14px 12px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 100dvh;
  }

  /* ── Header ── */
  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  .hdr-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--green-dark);
  }
  .hdr-pills { display: flex; gap: 8px; }
  .pill {
    background: var(--green-pale);
    border: 1px solid var(--green-light);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 13px;
    color: var(--green-dark);
    font-weight: 500;
  }
  .pill.boss {
    background: var(--red-pale);
    border-color: #ffcdd2;
    color: var(--red);
  }

  /* ── Plant Card ── */
  .plant-card {
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
  }
  #plant-canvas {
    display: block;
    width: 100%;
    height: 220px;
  }

  /* Boss overlay */
  #boss-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,235,238,0.96);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 20px;
    display: none;
  }
  #boss-overlay.show { display: flex; }
  .boss-bug { font-size: 52px; animation: wobble 0.6s infinite alternate; }
  @keyframes wobble {
    from { transform: rotate(-12deg) scale(1); }
    to   { transform: rotate(12deg) scale(1.1); }
  }
  .boss-title { font-size: 17px; font-weight: 600; color: var(--red); }
  .boss-sub { font-size: 13px; color: #b71c1c; text-align: center; padding: 0 20px; }
  .boss-hp-wrap { width: 70%; }
  .boss-hp-label { font-size: 12px; color: #b71c1c; margin-bottom: 4px; text-align: center; }
  .boss-hp-bar { height: 10px; background: #ffcdd2; border-radius: 5px; overflow: hidden; }
  .boss-hp-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red) 0%, #ff8a80 100%);
    border-radius: 5px;
    transition: width 0.35s ease;
  }

  /* Growth bar */
  .growth-wrap { padding: 10px 14px 12px; }
  .growth-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 5px;
  }
  .growth-bar { height: 8px; background: var(--green-light); border-radius: 4px; overflow: hidden; }
  .growth-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-mid) 0%, #a5d6a7 100%);
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  /* ── Quiz Card ── */
  .quiz-card {
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 18px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .q-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--green-pale);
    border: 1px solid var(--green-light);
    border-radius: 10px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--green-dark);
    font-weight: 500;
    width: fit-content;
  }
  .q-badge.boss-badge {
    background: var(--red-pale);
    border-color: #ffcdd2;
    color: var(--red);
  }
  .q-text {
    font-size: 16px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--text-main);
  }
  .choices { display: flex; flex-direction: column; gap: 8px; }
  .choice-btn {
    background: var(--page-bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: 'Sarabun', sans-serif;
    color: var(--text-main);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    line-height: 1.4;
  }
  .choice-btn:active { transform: scale(0.97); }
  .choice-btn:not([disabled]):hover { background: var(--green-pale); border-color: var(--green-mid); }
  .choice-btn.correct {
    background: #e8f5e9;
    border-color: var(--green-mid);
    color: var(--green-dark);
    font-weight: 500;
  }
  .choice-btn.wrong {
    background: var(--red-pale);
    border-color: var(--red);
    color: var(--red);
  }

  /* Feedback */
  .feedback {
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #e8f5e9; color: var(--green-dark); border: 1px solid var(--green-light); }
  .feedback.bad { background: var(--red-pale); color: var(--red); border: 1px solid #ffcdd2; }
  .feedback.warn { background: var(--amber-pale); color: var(--amber); border: 1px solid #ffe0b2; }

  /* Next button */
  .next-btn {
    width: 100%;
    padding: 12px;
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:active { transform: scale(0.98); background: var(--green-dark); }

  /* ── Screens ── */
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 32px 20px;
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    text-align: center;
  }
  .screen.show { display: flex; }
  .screen-emoji { font-size: 64px; line-height: 1; }
  .screen-title { font-size: 22px; font-weight: 600; }
  .screen-sub { font-size: 14px; color: var(--text-sub); line-height: 1.6; }
  .restart-btn {
    padding: 12px 32px;
    background: var(--green-mid);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }
  .restart-btn:active { transform: scale(0.97); }

  /* Water drop animation */
  .water-drops {
    position: absolute;
    pointer-events: none;
    left: 0; top: 0;
    width: 100%; height: 220px;
  }

  /* Health hearts */
  .health-row {
    display: flex;
    gap: 4px;
    justify-content: center;
    padding: 8px 0 2px;
    font-size: 18px;
    line-height: 1;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="hdr" id="hdr">
    <span class="hdr-title" id="stage-label">🌱 ด่านปกติ</span>
    <div class="hdr-pills">
      <span class="pill" id="water-pill">💧 0</span>
      <span class="pill" id="growth-pill">🌿 0%</span>
    </div>
  </div>

  <!-- Plant -->
  <div class="plant-card" id="plant-card">
    <canvas id="plant-canvas"></canvas>
    <div id="boss-overlay">
      <div class="boss-bug" id="boss-bug">🐛</div>
      <div class="boss-title">⚠️ แมลงบุกโจมตี!</div>
      <div class="boss-sub">ตอบคำถามให้ครบก่อนที่แมลงจะกินต้นไม้!</div>
      <div class="boss-hp-wrap">
        <div class="boss-hp-label">พลังแมลง: <span id="boss-hp-text">5</span> / 5</div>
        <div class="boss-hp-bar"><div class="boss-hp-fill" id="boss-hp-fill" style="width:100%"></div></div>
      </div>
    </div>
    <div class="health-row" id="health-row">❤️❤️❤️❤️❤️</div>
    <div class="growth-wrap">
      <div class="growth-row">
        <span>การเจริญเติบโต</span>
        <span id="growth-label">0 / 10 คะแนน</span>
      </div>
      <div class="growth-bar"><div class="growth-fill" id="growth-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Quiz -->
  <div class="quiz-card" id="quiz-card">
    <span class="q-badge" id="q-badge">📚 ชีววิทยา</span>
    <div class="q-text" id="q-text">กำลังโหลด...</div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQ()">ถัดไป →</button>
  </div>

  <!-- Win screen -->
  <div class="screen" id="win-screen">
    <div class="screen-emoji">🌸</div>
    <div class="screen-title">ปลูกต้นไม้สำเร็จ!</div>
    <div class="screen-sub">ต้นไม้เติบโตเต็มที่แล้ว<br>คุณเก่งมาก เรียนได้ดีเยี่ยม!</div>
    <button class="restart-btn" onclick="restart()">🌱 ปลูกต้นใหม่</button>
  </div>

  <!-- Dead screen -->
  <div class="screen" id="dead-screen">
    <div class="screen-emoji">🪲</div>
    <div class="screen-title">แมลงกินต้นไม้หมดแล้ว!</div>
    <div class="screen-sub">อย่าท้อนะ — ทบทวนบทเรียน<br>แล้วลองใหม่ได้เลย!</div>
    <button class="restart-btn" onclick="restart()">🔄 เริ่มใหม่</button>
  </div>

</div>

<script>
// ── Questions ──────────────────────────────────────────────────────────────
const NORMAL_QS = [
  {q:"หัวใจมนุษย์มีกี่ห้อง?",a:"4 ห้อง",opts:["2 ห้อง","3 ห้อง","4 ห้อง","6 ห้อง"],exp:"หัวใจมี 4 ห้อง: ซ้ายบน ซ้ายล่าง ขวาบน และขวาล่าง"},
  {q:"DNA ย่อมาจากอะไร?",a:"Deoxyribonucleic Acid",opts:["Deoxyribonucleic Acid","Dioxyribonucleic Acid","Diribonucleic Acid","Deoxyribose Acid"],exp:"DNA = Deoxyribonucleic Acid คือสารพันธุกรรมในเซลล์"},
  {q:"ออร์แกเนลที่ผลิตพลังงาน ATP คือ?",a:"ไมโทคอนเดรีย",opts:["ไรโบโซม","ไมโทคอนเดรีย","นิวเคลียส","คลอโรพลาสต์"],exp:"ไมโทคอนเดรียคือ 'โรงไฟฟ้าของเซลล์' ผลิต ATP ให้พลังงาน"},
  {q:"กระบวนการสังเคราะห์แสงเกิดที่ออร์แกเนลใด?",a:"คลอโรพลาสต์",opts:["ไมโทคอนเดรีย","นิวเคลียส","คลอโรพลาสต์","เอนโดพลาสมิกเรติคูลัม"],exp:"คลอโรพลาสต์มีคลอโรฟิลล์ดูดซับแสงสำหรับการสังเคราะห์แสง"},
  {q:"เซลล์พืชต่างจากเซลล์สัตว์ด้วยการมี?",a:"ผนังเซลล์และคลอโรพลาสต์",opts:["นิวเคลียส","ผนังเซลล์และคลอโรพลาสต์","เยื่อหุ้มเซลล์","ไมโทคอนเดรีย"],exp:"เซลล์พืชมีผนังเซลล์ (Cell Wall) และคลอโรพลาสต์ที่เซลล์สัตว์ไม่มี"},
  {q:"โปรตีนถูกสร้างที่ออร์แกเนลใด?",a:"ไรโบโซม",opts:["ไมโทคอนเดรีย","ไรโบโซม","กอลจิบอดี","ไลโซโซม"],exp:"ไรโบโซมแปลรหัส mRNA เป็นสายโปรตีน"},
  {q:"ฮีโมโกลบินในเลือดทำหน้าที่ใด?",a:"ลำเลียงออกซิเจน",opts:["ต่อสู้เชื้อโรค","ลำเลียงออกซิเจน","แข็งตัวของเลือด","ย่อยอาหาร"],exp:"ฮีโมโกลบินในเม็ดเลือดแดงจับกับ O₂ ลำเลียงไปทั่วร่างกาย"},
  {q:"กระดูกสันหลังมนุษย์มีกี่ชิ้น?",a:"33 ชิ้น",opts:["26 ชิ้น","30 ชิ้น","33 ชิ้น","40 ชิ้น"],exp:"กระดูกสันหลัง 33 ชิ้น แบ่งเป็น 5 ส่วน: คอ อก เอว กระเบนเหน็บ ก้นกบ"},
  {q:"ระบบใดควบคุมร่างกายด้วยฮอร์โมน?",a:"ระบบต่อมไร้ท่อ",opts:["ระบบประสาท","ระบบต่อมไร้ท่อ","ระบบย่อยอาหาร","ระบบภูมิคุ้มกัน"],exp:"ระบบต่อมไร้ท่อ (Endocrine System) หลั่งฮอร์โมนเข้าสู่กระแสเลือด"},
  {q:"เซลล์ประสาทส่งสัญญาณผ่านอะไร?",a:"สัญญาณไฟฟ้าเคมี",opts:["สัญญาณแม่เหล็ก","สัญญาณไฟฟ้าเคมี","คลื่นเสียง","คลื่นแสง"],exp:"เซลล์ประสาทส่งสัญญาณด้วยศักย์ไฟฟ้า (Action Potential) และสารสื่อประสาท"},
  {q:"เลือดประกอบด้วยส่วนประกอบหลักใด?",a:"พลาสมา เม็ดเลือดแดง เม็ดเลือดขาว เกล็ดเลือด",opts:["พลาสมาอย่างเดียว","พลาสมา เม็ดเลือดแดง เม็ดเลือดขาว เกล็ดเลือด","น้ำและโปรตีน","เม็ดเลือดแดงและพลาสมา"],exp:"เลือดมี 4 ส่วน: พลาสมา (55%) เม็ดเลือดแดง เม็ดเลือดขาว และเกล็ดเลือด"},
  {q:"ไตทำหน้าที่หลักใด?",a:"กรองของเสียออกจากเลือด",opts:["สร้างเม็ดเลือดแดง","กรองของเสียออกจากเลือด","ผลิตน้ำดี","สร้างฮอร์โมนการเจริญเติบโต"],exp:"ไตกรองเลือดประมาณ 180 ลิตรต่อวัน ผลิตปัสสาวะเพื่อกำจัดของเสีย"},
];

const BOSS_QS = [
  {q:"[ยาก] สมการรวมของ Cellular Respiration คือ?",a:"C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP",opts:["C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + ATP","6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂","C₆H₁₂O₆ → CO₂ + H₂O","O₂ + H₂O → ATP + CO₂"],exp:"การหายใจระดับเซลล์สลายกลูโคสด้วยออกซิเจนได้ CO₂, H₂O และ ATP"},
  {q:"[ยาก] Meiosis ต่างจาก Mitosis อย่างไร?",a:"ได้เซลล์ลูก 4 เซลล์ที่มี DNA ครึ่งหนึ่ง",opts:["ได้เซลล์ลูก 2 เซลล์","ได้เซลล์ลูก 4 เซลล์ที่มี DNA ครึ่งหนึ่ง","เกิดในเซลล์ทั่วไป","ไม่มีการแบ่งโครโมโซม"],exp:"Meiosis แบ่ง 2 รอบ ได้ 4 เซลล์ gamete (n) สำหรับการสืบพันธุ์"},
  {q:"[ยาก] กฎแห่งการแยกตัวของเมนเดลหมายความว่า?",a:"แอลลีลคู่แยกออกจากกันเมื่อสร้างเซลล์สืบพันธุ์",opts:["ยีนอยู่บนโครโมโซมเดียวกัน","แอลลีลคู่แยกออกจากกันเมื่อสร้างเซลล์สืบพันธุ์","ลักษณะเด่นข่มลักษณะด้อย","ยีนถ่ายทอดจากแม่เท่านั้น"],exp:"Allele แยกกันตอน Meiosis — เซลล์สืบพันธุ์ได้รับเพียง 1 allele"},
  {q:"[ยาก] Enzyme ลดสิ่งใดในปฏิกิริยาเคมี?",a:"พลังงานกระตุ้น (Activation Energy)",opts:["อุณหภูมิปฏิกิริยา","พลังงานกระตุ้น (Activation Energy)","ความดันในระบบ","สมดุลปฏิกิริยา"],exp:"Enzyme เป็นตัวเร่งชีวภาพที่ลด Activation Energy โดยไม่ถูกใช้หมดไป"},
  {q:"[ยาก] โครโมโซมเพศของหญิงและชายคือ?",a:"หญิง XX / ชาย XY",opts:["หญิง XY / ชาย XX","หญิง XX / ชาย XY","หญิง XO / ชาย XY","หญิง XX / ชาย YY"],exp:"เพศหญิง XX, เพศชาย XY — โครโมโซม Y กำหนดเพศชาย"},
  {q:"[ยาก] การสังเคราะห์แสง แบ่งเป็นกี่ขั้นตอน?",a:"2 ขั้น: ปฏิกิริยาแสงและวัฏจักรคาลวิน",opts:["1 ขั้น: ดูดซับแสงอย่างเดียว","2 ขั้น: ปฏิกิริยาแสงและวัฏจักรคาลวิน","3 ขั้น: แสง น้ำ และ CO₂","4 ขั้น: ตามช่วงเวลา"],exp:"การสังเคราะห์แสง: (1) Light Reactions ใน Thylakoid (2) Calvin Cycle ใน Stroma"},
];

// ── State ──────────────────────────────────────────────────────────────────
let S = {};
function initState() {
  S = { growth:0, maxGrowth:10, water:0, mode:'normal',
        bossHp:5, bossMax:5, bossStreak:0,
        plantHealth:5, maxHealth:5,
        usedN:[], usedB:[], answered:false, currentQ:null,
        waterAnims:[] };
}

// ── Canvas ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('plant-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  const W = canvas.parentElement.clientWidth;
  canvas.width = W; canvas.height = 220;
}
window.addEventListener('resize', () => { resizeCanvas(); drawPlant(); });
resizeCanvas();

function drawPlant() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const g = Math.min(S.growth / S.maxGrowth, 1);
  const health = S.plantHealth / S.maxHealth;

  // sky
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#dff0e8'); sky.addColorStop(1,'#c8e6c9');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // ground
  ctx.fillStyle = '#8d6e63'; ctx.fillRect(0,185,W,H);
  ctx.fillStyle = '#a5d6a7'; ctx.fillRect(0,181,W,8);

  // pot
  const cx = W/2;
  ctx.fillStyle = '#bf8a6e';
  ctx.beginPath();
  ctx.moveTo(cx-40,195); ctx.lineTo(cx+40,195);
  ctx.lineTo(cx+34,181); ctx.lineTo(cx-34,181);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#d4a484';
  ctx.fillRect(cx-44,177,88,8);

  const stemH = 30 + g*130;
  const bX = cx, bY = 177;

  // stem
  ctx.strokeStyle = health > 0.4 ? '#558b2f' : '#827717';
  ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(bX,bY); ctx.lineTo(bX, bY-stemH); ctx.stroke();

  // leaf color by health
  const lc = health > 0.6 ? '#43a047' : (health > 0.3 ? '#9ccc65' : '#d4e157');

  if (g > 0.08) leaf(bX, bY-stemH*0.28, 1, lc, g);
  if (g > 0.18) leaf(bX, bY-stemH*0.46, -1, lc, g);
  if (g > 0.35) leaf(bX, bY-stemH*0.62, 1, lc, g);
  if (g > 0.52) leaf(bX, bY-stemH*0.76, -1, lc, g);
  if (g > 0.70) leaf(bX, bY-stemH*0.88, 1, lc, g);

  // bud / flower
  if (g > 0.78) {
    const fx = bX, fy = bY - stemH;
    if (g > 0.92) {
      // Full flower
      const petals = 8, pr = 10 + g*9;
      ctx.fillStyle = '#f48fb1';
      for (let i=0;i<petals;i++) {
        const a = (i/petals)*Math.PI*2;
        ctx.beginPath();
        ctx.ellipse(fx+Math.cos(a)*pr, fy+Math.sin(a)*pr, 8, 5, a, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = '#fdd835';
      ctx.beginPath(); ctx.arc(fx,fy,9,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = '#c8e6c9';
      ctx.beginPath(); ctx.ellipse(fx,fy,7,12,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='#43a047'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.ellipse(fx,fy,7,12,0,0,Math.PI*2); ctx.stroke();
    }
  }

  // damage overlay
  if (health < 0.6) {
    ctx.fillStyle = `rgba(230,57,35,${(0.6-health)*0.35})`;
    ctx.fillRect(0,0,W,H);
  }

  // water drops
  S.waterAnims = S.waterAnims.filter(wa => {
    wa.t += 0.06;
    if (wa.t >= 1) return false;
    const alpha = 1 - wa.t;
    const y = bY - 60 - wa.t*50;
    for (let i=0;i<3;i++) {
      const x = bX - 20 + i*20;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#42a5f5';
      ctx.beginPath(); ctx.ellipse(x,y,4,6,0,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }
    return true;
  });
  if (S.waterAnims.length > 0) requestAnimationFrame(drawPlant);
}

function leaf(x,y,dir,color,g) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.quadraticCurveTo(x+dir*40,y-12,x+dir*44,y+6);
  ctx.quadraticCurveTo(x+dir*22,y+16,x,y);
  ctx.fill();
  ctx.strokeStyle='#388e3c'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+dir*38,y+4); ctx.stroke();
}

// ── UI Updates ─────────────────────────────────────────────────────────────
function updateUI() {
  const pct = Math.round(S.growth/S.maxGrowth*100);
  document.getElementById('growth-pill').textContent = '🌿 '+pct+'%';
  document.getElementById('water-pill').textContent = '💧 '+S.water;
  document.getElementById('growth-fill').style.width = pct+'%';
  document.getElementById('growth-label').textContent = S.growth+' / '+S.maxGrowth+' คะแนน';

  // hearts
  const h = document.getElementById('health-row');
  let hearts = '';
  for (let i=0;i<S.maxHealth;i++) hearts += (i < S.plantHealth ? '❤️' : '🖤');
  h.textContent = hearts;

  const overlay = document.getElementById('boss-overlay');
  if (S.mode === 'boss') {
    overlay.classList.add('show');
    document.getElementById('stage-label').textContent = '🐛 ด่านบอส!';
    document.getElementById('boss-hp-text').textContent = S.bossHp;
    document.getElementById('boss-hp-fill').style.width = (S.bossHp/S.bossMax*100)+'%';
    document.getElementById('q-badge').textContent = '⚠️ คำถามยาก';
    document.getElementById('q-badge').className = 'q-badge boss-badge';
  } else {
    overlay.classList.remove('show');
    document.getElementById('stage-label').textContent = '🌱 ด่านปกติ';
    document.getElementById('q-badge').textContent = '📚 ชีววิทยา';
    document.getElementById('q-badge').className = 'q-badge';
  }

  drawPlant();
}

// ── Questions ──────────────────────────────────────────────────────────────
function pickQ(isBoss) {
  const pool = isBoss ? BOSS_QS : NORMAL_QS;
  const used  = isBoss ? S.usedB : S.usedN;
  const avail = pool.filter((_,i) => !used.includes(i));
  const src   = avail.length ? avail : pool;
  if (!avail.length) { if(isBoss) S.usedB=[]; else S.usedN=[]; }
  const idx = Math.floor(Math.random()*src.length);
  const realIdx = pool.indexOf(src[idx]);
  if(isBoss) S.usedB.push(realIdx); else S.usedN.push(realIdx);
  return src[idx];
}

function loadQ() {
  S.answered = false;
  S.currentQ = pickQ(S.mode === 'boss');
  document.getElementById('q-text').textContent = S.currentQ.q;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').className = 'next-btn';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  [...S.currentQ.opts].sort(()=>Math.random()-0.5).forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt;
    btn.onclick = () => answer(opt, btn);
    choicesEl.appendChild(btn);
  });
  updateUI();
}

// ── Answer ─────────────────────────────────────────────────────────────────
function answer(selected, clickedBtn) {
  if (S.answered) return;
  S.answered = true;

  const correct = selected === S.currentQ.a;
  const fb = document.getElementById('feedback');

  document.querySelectorAll('.choice-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === S.currentQ.a) b.classList.add('correct');
    else if (b === clickedBtn && !correct) b.classList.add('wrong');
  });

  if (correct) {
    if (S.mode === 'boss') {
      S.bossHp--;
      if (S.bossHp <= 0) {
        S.mode = 'normal';
        S.plantHealth = Math.min(S.maxHealth, S.plantHealth + 2);
        fb.className = 'feedback ok show';
        fb.textContent = '🎉 ชนะแมลงแล้ว! ต้นไม้ฟื้นตัว! +2❤️';
        updateUI();
        setTimeout(() => loadQ(), 1800);
        return;
      }
      fb.className = 'feedback ok show';
      fb.textContent = '✅ ถูก! พลังแมลงลด ('+(S.bossMax-S.bossHp)+'/'+S.bossMax+') ตอบต่อไป!';
      updateUI();
      document.getElementById('next-btn').className = 'next-btn show';
    } else {
      S.growth = Math.min(S.maxGrowth, S.growth + 1);
      S.water++;
      S.waterAnims.push({t:0});
      fb.className = 'feedback ok show';
      fb.textContent = '✅ ถูก! ได้น้ำ 1 กระถาง 💧 ต้นไม้โตขึ้น!';
      updateUI();
      if (S.growth >= S.maxGrowth) { setTimeout(() => showScreen('win'), 900); return; }
      S.bossStreak++;
      if (S.bossStreak >= 3) {
        S.bossStreak = 0; S.bossHp = S.bossMax;
        S.mode = 'boss';
        fb.textContent = '✅ ถูก! แต่... 🐛 แมลงกำลังมาโจมตี!';
        updateUI();
        setTimeout(() => loadQ(), 1600);
        return;
      }
      document.getElementById('next-btn').className = 'next-btn show';
    }
  } else {
    if (S.mode === 'boss') {
      S.plantHealth = Math.max(0, S.plantHealth - 1);
      fb.className = 'feedback bad show';
      fb.textContent = '❌ ผิด! แมลงกัดต้นไม้ -1❤️  คำตอบที่ถูก: '+S.currentQ.a;
      updateUI();
      if (S.plantHealth <= 0) { setTimeout(() => showScreen('dead'), 1200); return; }
      document.getElementById('next-btn').className = 'next-btn show';
    } else {
      fb.className = 'feedback bad show';
      fb.textContent = '❌ ผิด ไม่ได้น้ำรอบนี้ — '+S.currentQ.exp;
      document.getElementById('next-btn').className = 'next-btn show';
    }
  }
}

function nextQ() { loadQ(); }

// ── Screens ────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('plant-card').style.display = 'none';
  document.getElementById('hdr').style.display = 'none';
  if (name === 'win') document.getElementById('win-screen').classList.add('show');
  if (name === 'dead') document.getElementById('dead-screen').classList.add('show');
}

function restart() {
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('dead-screen').classList.remove('show');
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('plant-card').style.display = '';
  document.getElementById('hdr').style.display = '';
  initState();
  loadQ();
}

// ── Boot ───────────────────────────────────────────────────────────────────
initState();
loadQ();
</script>
